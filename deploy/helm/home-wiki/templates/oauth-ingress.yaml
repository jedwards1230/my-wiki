{{- if .Values.auth.discovery.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-oauth
  labels:
    app.kubernetes.io/name: wiki
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: oauth-metadata
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /.well-known
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  name: oauth-metadata
          - path: /authorize
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  name: oauth-metadata
          - path: /token
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  name: oauth-metadata
          - path: /application/o/{{ .Values.auth.discovery.providerSlug }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  name: oauth-metadata
{{- end }}
