{{- if and .Values.auth.enabled (not .Values.mcp.enabled) -}}
{{- fail "auth.enabled requires mcp.enabled — the auth middleware only guards the MCP endpoint. Enable mcp or disable auth." -}}
{{- end -}}
{{- if and .Values.auth.enabled (not .Values.auth.allowedGroups) (not .Values.auth.allowAnyUser) -}}
{{- fail "auth.enabled with empty auth.allowedGroups requires auth.allowAnyUser=true to explicitly opt in to granting any authenticated user full write access." -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: wiki
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: wiki
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wiki
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        fsGroup: 100
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
        - name: setup-sync
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              set -e
              export HOME=/data/home
              mkdir -p $HOME /data/vault

              echo "Logging in to Obsidian..."
              ob login --email="$OBSIDIAN_EMAIL" --password="$OBSIDIAN_PASSWORD"

              if ! ob sync-status --path /data/vault 2>/dev/null; then
                echo "Setting up sync for {{ .Values.obsidian.vault }}..."
                ob sync-setup \
                  --vault {{ .Values.obsidian.vault | quote }} \
                  --path /data/vault \
                  --password "$OBSIDIAN_E2E_PASSWORD" \
                  --device-name {{ .Values.obsidian.deviceName | quote }}
                ob sync-config \
                  --path /data/vault \
                  --excluded-folders {{ .Values.obsidian.excludedFolders | quote }} \
                  --mode {{ .Values.obsidian.syncMode | quote }} \
                  --device-name {{ .Values.obsidian.deviceName | quote }}
              fi

              echo "Running initial sync..."
              ob sync --path /data/vault
              echo "Init sync complete."
          env:
            - name: OBSIDIAN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.obsidianSecretName | default (printf "%s-obsidian" .Release.Name) }}
                  key: OBSIDIAN_EMAIL
            - name: OBSIDIAN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.obsidianSecretName | default (printf "%s-obsidian" .Release.Name) }}
                  key: OBSIDIAN_PASSWORD
            - name: OBSIDIAN_E2E_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.obsidianSecretName | default (printf "%s-obsidian" .Release.Name) }}
                  key: OBSIDIAN_E2E_PASSWORD
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources.setupSync | nindent 12 }}

        - name: setup-quartz
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          env:
            - name: QUARTZ_BASE_URL
              value: {{ .Values.quartz.baseUrl | quote }}
            - name: QUARTZ_REPO_URL
              value: {{ .Values.quartz.repoUrl | quote }}
          args:
            - |
              set -e
              echo "Copying Quartz project to PVC..."
              rm -rf /data/quartz
              cp -r /quartz /data/quartz

              cd /data/quartz
              if [ -n "$QUARTZ_BASE_URL" ]; then
                echo "Setting baseUrl to $QUARTZ_BASE_URL..."
                escaped=$(printf '%s' "$QUARTZ_BASE_URL" | sed 's/[&|\\]/\\&/g')
                sed -i "s|%%BASE_URL%%|$escaped|" quartz.config.ts
              fi
              if [ -n "$QUARTZ_REPO_URL" ]; then
                echo "Setting repoUrl to $QUARTZ_REPO_URL..."
                escaped=$(printf '%s' "$QUARTZ_REPO_URL" | sed 's/[&|\\]/\\&/g')
                sed -i "s|%%REPO_URL%%|$escaped|" quartz.layout.ts
              fi

              echo "Generating index files..."
              wiki-server --vault /data/vault directory --generate

              echo "Building Quartz..."
              npx quartz build --output /data/public --directory ../vault
              echo "Quartz build complete."
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources.setupQuartz | nindent 12 }}

      containers:
        - name: sync
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              export HOME=/data/home
              echo "Starting continuous sync..."
              ob sync --path /data/vault --continuous
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources.sync | nindent 12 }}

        - name: quartz
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              echo "Starting Quartz in watch mode..."
              cd /data/quartz
              npx quartz build --watch --concurrency {{ .Values.quartz.concurrency }} --output /data/public --directory ../vault
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources.quartz | nindent 12 }}

        - name: wiki-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/wiki-server", "serve"]
          args:
            {{- if .Values.mcp.enabled }}
            - --mcp-port={{ .Values.mcp.port }}
            {{- end }}
          env:
            - name: WIKI_PUBLIC_DIR
              value: "/data/public"
            - name: WIKI_VAULT_DIR
              value: "/data/vault"
            - name: WIKI_PORT
              value: "8080"
            {{- if .Values.auth.enabled }}
            - name: WIKI_AUTH_ISSUER
              value: {{ required "auth.issuer is required when auth.enabled=true" .Values.auth.issuer | quote }}
            - name: WIKI_AUTH_AUDIENCE
              value: {{ required "auth.audience is required when auth.enabled=true" .Values.auth.audience | quote }}
            {{- if .Values.auth.allowedGroups }}
            - name: WIKI_AUTH_ALLOWED_GROUPS
              value: {{ join "," .Values.auth.allowedGroups | quote }}
            {{- end }}
            {{- if .Values.auth.allowAnyUser }}
            - name: WIKI_AUTH_ALLOW_ANY_USER
              value: "true"
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- if .Values.mcp.enabled }}
            - name: mcp
              containerPort: {{ .Values.mcp.port }}
              protocol: TCP
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources.wikiServer | nindent 12 }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
