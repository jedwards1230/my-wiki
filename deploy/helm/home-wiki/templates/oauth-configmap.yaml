{{- if .Values.auth.discovery.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-oauth-metadata
  labels:
    app.kubernetes.io/name: wiki
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: oauth-metadata
data:
  nginx.conf: |
    # Resolver for proxy_pass with variables
    resolver 10.43.0.10 valid=30s;  # CoreDNS

    # Rate limiting for /token endpoint (credential-stuffing protection)
    limit_req_zone $binary_remote_addr zone=token_limit:1m rate=10r/s;

    server {
        listen 8090;

        # RFC 9728: Protected Resource Metadata
        location /.well-known/oauth-protected-resource {
            default_type application/json;
            alias /etc/nginx/metadata/resource-server.json;
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Cache-Control "max-age=3600";

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type";
                add_header Content-Length 0;
                return 204;
            }
        }

        # RFC 8414: Authorization Server Metadata
        location /.well-known/oauth-authorization-server {
            default_type application/json;
            alias /etc/nginx/metadata/authorization-server.json;
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Cache-Control "max-age=3600";

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type";
                add_header Content-Length 0;
                return 204;
            }
        }

        # OIDC Discovery — proxy to Authentik
        location /application/o/{{ .Values.auth.discovery.providerSlug }}/.well-known/openid-configuration {
            proxy_pass {{ .Values.auth.discovery.authentikInternalUrl }}/application/o/{{ .Values.auth.discovery.providerSlug }}/.well-known/openid-configuration;
            proxy_set_header Host {{ .Values.auth.discovery.authentikExternalHost }};
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            add_header Access-Control-Allow-Origin "*";
        }

        # JWKS endpoint — proxy to Authentik
        location /application/o/{{ .Values.auth.discovery.providerSlug }}/jwks/ {
            proxy_pass {{ .Values.auth.discovery.authentikInternalUrl }}/application/o/{{ .Values.auth.discovery.providerSlug }}/jwks/;
            proxy_set_header Host {{ .Values.auth.discovery.authentikExternalHost }};
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            add_header Access-Control-Allow-Origin "*";
            add_header Cache-Control "max-age=3600";
        }

        # Authorization endpoint — redirect to Authentik
        location /authorize {
            return 302 https://{{ .Values.auth.discovery.authentikExternalHost }}/application/o/authorize/$is_args$args;
        }

        # Token endpoint — proxy to Authentik (rate limited)
        location /token {
            limit_req zone=token_limit burst=20 nodelay;

            proxy_pass {{ .Values.auth.discovery.authentikInternalUrl }}/application/o/token/;
            proxy_set_header Host {{ .Values.auth.discovery.authentikExternalHost }};
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
        }

        # Health check endpoint
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }

  resource-server.json: |
    {
      "resource": {{ .Values.auth.discovery.resourceUrl | quote }},
      "authorization_servers": [
        {{ printf "%s/" .Values.auth.discovery.resourceUrl | quote }}
      ],
      "scopes_supported": [
        "openid",
        "profile",
        "email",
        "groups"
      ],
      "bearer_methods_supported": [
        "header"
      ],
      "resource_signing_alg_values_supported": [
        "RS256"
      ]
    }

  authorization-server.json: |
    {
      "issuer": {{ printf "%s/" .Values.auth.discovery.resourceUrl | quote }},
      "authorization_endpoint": {{ printf "%s/authorize" .Values.auth.discovery.resourceUrl | quote }},
      "token_endpoint": {{ printf "%s/token" .Values.auth.discovery.resourceUrl | quote }},
      "jwks_uri": {{ printf "https://%s/application/o/%s/jwks/" .Values.auth.discovery.authentikExternalHost .Values.auth.discovery.providerSlug | quote }},
      "scopes_supported": ["openid", "profile", "email", "groups"],
      "response_types_supported": ["code"],
      "grant_types_supported": ["authorization_code", "refresh_token"],
      "token_endpoint_auth_methods_supported": ["client_secret_post", "client_secret_basic"],
      "code_challenge_methods_supported": ["S256"]
    }
{{- end }}
