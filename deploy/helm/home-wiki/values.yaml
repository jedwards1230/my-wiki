replicaCount: 1

image:
  repository: ghcr.io/jedwards1230/home-wiki
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: wiki.example.com
  tls:
    secretName: wiki-tls

obsidian:
  vault: "Home Wiki"
  deviceName: "k8s-wiki"
  excludedFolders: "private"
  syncMode: "bidirectional"

quartz:
  concurrency: 4

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi

# Name of the K8s Secret containing OBSIDIAN_EMAIL, OBSIDIAN_PASSWORD, OBSIDIAN_E2E_PASSWORD.
# Create this secret however you like (kubectl, Sealed Secrets, External Secrets, etc.)
obsidianSecretName: ""  # defaults to {{ .Release.Name }}-obsidian

homepage:
  enabled: false
  name: "Wiki"
  description: "Home knowledge base"
  group: "Web Services"
  icon: "obsidian.png"

resources:
  setupSync:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  setupQuartz:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  sync:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  quartz:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  wikiServer:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

nodeSelector: {}
tolerations: []

# Inject arbitrary manifests (e.g., OnePasswordItem, NetworkPolicy, ServiceMonitor)
extraManifests: []
