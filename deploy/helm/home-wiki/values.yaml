replicaCount: 1

image:
  repository: ghcr.io/jedwards1230/home-wiki
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: wiki.example.com
  tls:
    secretName: wiki-tls

obsidian:
  vault: "Home Wiki"
  deviceName: "home-wiki"
  excludedFolders: "private"
  syncMode: "bidirectional"

quartz:
  concurrency: 4
  baseUrl: "wiki.example.com"
  repoUrl: "https://github.com/jedwards1230/home-wiki/releases"

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi

# Name of the K8s Secret containing OBSIDIAN_EMAIL, OBSIDIAN_PASSWORD, OBSIDIAN_E2E_PASSWORD.
# Create this secret however you like (kubectl, Sealed Secrets, External Secrets, etc.)
obsidianSecretName: ""  # defaults to {{ .Release.Name }}-obsidian

homepage:
  enabled: false
  name: "Wiki"
  description: "Home knowledge base"
  group: "Web Services"
  icon: "obsidian.png"

resources:
  setupSync:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  setupQuartz:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  sync:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  quartz:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  wikiServer:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

mcp:
  enabled: false
  port: 8081
  # Separate Ingress resource for /mcp path.
  ingress:
    enabled: false
    middleware: ""  # Traefik middleware (e.g., kube-system-redirect-lan-auth@kubernetescrd)
  # NetworkPolicy restricting which namespaces can reach the MCP port.
  # When disabled (default), the MCP port is reachable from any pod in the cluster.
  networkPolicy:
    enabled: false
    # Namespaces allowed to reach the MCP port (by kubernetes.io/metadata.name label).
    allowedNamespaces: []
    #  - mcp-infra

auth:
  # Require auth on read-only GET routes (pages, search, etc.).
  # When false (default), only mutating routes require auth.
  authReads: false

  # Server-level JWT validation (Go middleware).
  # Protects /mcp and mutating /api/ routes (and reads when auth.authReads=true).
  jwt:
    enabled: false
    # Must exactly match the iss claim emitted by your OIDC provider (e.g. Authentik).
    issuer: ""
    # OAuth2 client ID / expected aud claim.
    audience: ""
    # Group allowlist — the token's groups claim must contain at least one entry.
    # Leaving this empty requires allowAnyUser=true as an explicit opt-in.
    allowedGroups: []
    # Fail-closed default: when allowedGroups is empty, the server refuses to start
    # unless this is set to true. Only enable when you trust every user your OIDC
    # provider will issue a token for (e.g. a single-tenant Authentik instance).
    allowAnyUser: false
    # RFC 9728 Protected Resource Metadata URL — when set, 401 responses include
    # WWW-Authenticate header for MCP OAuth discovery.
    resourceMetadataUrl: ""

  # OAuth discovery sidecar (nginx serving RFC 9728 + 8414 metadata).
  # Required for Claude Desktop / Custom Connectors to discover how to auth.
  discovery:
    enabled: false
    providerSlug: ""        # Authentik provider slug (e.g., "home-wiki")
    resourceUrl: ""         # External URL (e.g., "https://wiki.lilbro.cloud")
    authentikInternalUrl: "http://authentik-server.web-services.svc.cluster.local:9000"
    authentikExternalHost: "auth.lilbro.cloud"
    resources:
      requests:
        cpu: 5m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi

metrics:
  enabled: false
  interval: 30s

nodeSelector: {}
tolerations: []

# Inject arbitrary manifests (e.g., OnePasswordItem, NetworkPolicy, ServiceMonitor)
extraManifests: []
