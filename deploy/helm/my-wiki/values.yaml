replicaCount: 1

image:
  repository: ghcr.io/jedwards1230/my-wiki
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

timezone: "UTC"

# Canonical external base URL (e.g. "https://wiki.example.com"). Used by the
# native renderer for sitemap, RSS, and canonical/OpenGraph links.
# Empty = relative links only.
baseURL: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: wiki.example.com
  tls:
    secretName: wiki-tls

obsidian:
  vault: "My Wiki"
  deviceName: "my-wiki"
  excludedFolders: "private"
  syncMode: "bidirectional"

# When true, obsidian-headless runs as a separate single-replica Deployment
# instead of as init+sidecar in the main server pod. Requires
# persistence.enabled=true and persistence.accessMode=ReadWriteMany so both
# Deployments can mount the PVC and share data.
obsidianSync:
  standalone: false

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi

# Pod-level securityContext applied to both the wiki server and (when standalone)
# wiki-sync Deployments. fsGroup is hardcoded to 100 because the wiki image
# expects files to be group-writable by the users (100) group. fsGroupChangePolicy
# defaults to OnRootMismatch to skip kubelet's recursive chown on every rollout
# once the volume root has the right group — important for large NFS volumes.
podSecurityContext:
  fsGroupChangePolicy: OnRootMismatch

# Name of the K8s Secret containing OBSIDIAN_EMAIL, OBSIDIAN_PASSWORD, OBSIDIAN_E2E_PASSWORD.
# Create this secret however you like (kubectl, Sealed Secrets, External Secrets, etc.)
obsidianSecretName: ""  # defaults to {{ .Release.Name }}-obsidian

homepage:
  enabled: false
  name: "Wiki"
  description: "Home knowledge base"
  group: "Web Services"
  icon: "obsidian.png"

resources:
  setupSync:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  sync:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  wikiServer:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

mcp:
  enabled: false
  port: 8081
  # Separate Ingress resource for /mcp path.
  ingress:
    enabled: false
    middleware: ""  # Traefik middleware (e.g., kube-system-redirect-lan-auth@kubernetescrd)
  # NetworkPolicy restricting which namespaces can reach the MCP port.
  # When disabled (default), the MCP port is reachable from any pod in the cluster.
  networkPolicy:
    enabled: false
    # Namespaces allowed to reach the MCP port (by kubernetes.io/metadata.name label).
    allowedNamespaces: []
    #  - mcp-infra

auth:
  # Require auth on read-only GET routes (pages, search, etc.).
  # When false (default), only mutating routes require auth.
  authReads: false

  # Explicitly run with NO authentication. Required when jwt.enabled=false:
  # the server fails closed, so a network-gated (e.g. LAN-only) deployment
  # must acknowledge running open by setting this true.
  disabled: false

  # Server-level JWT validation (Go middleware).
  # Protects /mcp and mutating /api/ routes (and reads when auth.authReads=true).
  jwt:
    enabled: false
    # Must exactly match the iss claim emitted by your OIDC provider (e.g. Authentik).
    issuer: ""
    # OAuth2 client ID / expected aud claim.
    audience: ""
    # Group allowlist — the token's groups claim must contain at least one entry.
    # Leaving this empty requires allowAnyUser=true as an explicit opt-in.
    allowedGroups: []
    # Fail-closed default: when allowedGroups is empty, the server refuses to start
    # unless this is set to true. Only enable when you trust every user your OIDC
    # provider will issue a token for (e.g. a single-tenant Authentik instance).
    allowAnyUser: false
    # RFC 9728 Protected Resource Metadata URL — when set, 401 responses include
    # WWW-Authenticate header for MCP OAuth discovery.
    resourceMetadataUrl: ""

  # OAuth discovery sidecar (nginx serving RFC 9728 + 8414 metadata).
  # Required for Claude Desktop / Custom Connectors to discover how to auth.
  discovery:
    enabled: false
    providerSlug: ""        # Authentik provider slug (e.g., "my-wiki")
    resourceUrl: ""         # External URL (e.g., "https://wiki.example.com")
    authentikInternalUrl: "http://authentik-server.authentik.svc.cluster.local:9000"
    authentikExternalHost: "auth.example.com"
    resources:
      requests:
        cpu: 5m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi

metrics:
  enabled: false
  interval: 30s

# Directory index generation tuning (maps to the WIKI_INDEX_* env vars).
# Both lists default to empty here; left empty, the var is not set and the
# server applies its own defaults — no directories excluded from index
# generation, and meta/activity kept out of "Recently Updated".
indexing:
  # Directories that should NOT receive a generated index.md.
  excludeDirs: []
  # Directories whose pages are excluded from every "Recently Updated"
  # section (server default when unset: meta/activity).
  noRecentsDirs: []
  # Description text for the generated root index.md frontmatter.
  # Left empty, the var is not set and the server applies its default
  # ("Shared knowledge base"). Override to brand the index for a specific
  # deployment (e.g. "Team knowledge base for Acme Corp").
  rootDescription: ""

# Webhook dispatcher: consumer-agnostic surface for delivering signed
# envelopes when inbox/ content changes. Disabled by default.
#
# Secrets: this chart does not create Secrets. Operators must create a
# user-managed Secret containing one key per `secretEnvKey` / `bearerEnvKey`
# referenced below, and set `webhooks.secrets.existingSecretName` to its
# name. Each consumer's HMAC secret and (optional) bearer token are then
# projected into the pod as environment variables.
webhooks:
  enabled: false
  # Scan inbox/ on startup and emit a synthetic reconcile event for any
  # pending files so consumers can catch up across restarts.
  reconcileOnStart: true

  defaults:
    timeout: 10s
    retries:
      maxAttempts: 5
      initialBackoff: 2s
      maxBackoff: 2m
    circuitBreaker:
      threshold: 5
      cooldown: 60s
    debounce:
      inbox.changed: 90s

  # Wiki locators embedded in every envelope so consumers can call back into
  # this instance without being pre-configured. Required when webhooks.enabled.
  wiki:
    baseURL: ""   # e.g. https://wiki.example.com
    mcpURL: ""    # e.g. https://wiki.example.com/mcp

  # Event → prompt mapping. Consumers fetch
  # `<wiki.baseURL>/meta/prompts/<prompt>.md` to load instructions.
  events:
    inbox.changed:
      prompt: inbox-manager

  # List of webhook consumers. Each entry:
  #   name:           unique identifier (used in metrics labels)
  #   url:            full webhook URL (https recommended)
  #   events:         event types this consumer subscribes to
  #   pathFilters:
  #     include:      [optional] prefix list — only paths matching at least one entry
  #     exclude:      [optional] prefix list — paths matching any are dropped
  #   secretEnvKey:   env var name holding the HMAC-SHA256 secret (required)
  #   bearerEnvKey:   [optional] env var name holding a bearer token
  #   timeout:        [optional] per-consumer override
  #   retries:        [optional] per-consumer override
  #   circuitBreaker: [optional] per-consumer override
  #   skipAllDeletes: [optional] true to suppress dispatches where every
  #                   change in the batch has action=deleted. Useful for
  #                   agent-driven consumers that would otherwise re-trigger
  #                   themselves when cleaning up processed files. Mixed
  #                   batches (any created/modified path) still dispatch.
  consumers: []
  # Example:
  #   - name: automation
  #     url: https://automation.example.com/webhook/inbox
  #     events: [inbox.changed]
  #     pathFilters:
  #       include: ["inbox/"]
  #     secretEnvKey: WIKI_WEBHOOK_AUTOMATION_SECRET
  #     bearerEnvKey: WIKI_WEBHOOK_AUTOMATION_BEARER

  # Name of an existing Kubernetes Secret that provides the env vars named
  # in consumer secretEnvKey/bearerEnvKey. The Secret is NOT created by this
  # chart; create it via kubectl, Sealed Secrets, 1Password Operator, etc.
  secrets:
    existingSecretName: ""

  # PrometheusRule for alerting on dispatch failures. Requires the Prometheus
  # Operator CRDs to be installed in the cluster.
  alerts:
    enabled: true
    failureRateThreshold: 0.1
    droppedDeliveriesFor: 5m
    queueDepthThreshold: 100

nodeSelector: {}
tolerations: []

# Inject arbitrary manifests (e.g., OnePasswordItem, NetworkPolicy, ServiceMonitor)
extraManifests: []
