services:
  wiki:
    build:
      context: .
      args:
        BUILD_VERSION: dev
    environment:
      # Canonical base URL for sitemap/RSS/canonical links (optional locally).
      WIKI_BASE_URL: http://localhost:8080
      # Local dev has no OIDC provider — explicitly run the server without auth.
      WIKI_AUTH_DISABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ${WIKI_VAULT:-./vault}:/data/vault:ro
    command:
      - wiki-server
      - serve
      - --vault
      - /data/vault
      - --port
      - "8080"
