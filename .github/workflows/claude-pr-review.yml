# Claude PR review — calls the shared reusable workflow in
# jedwards1230/release-workflows (claude-code-action@v1, Haiku, with the public
# jedwards1230-plugins marketplace + review-team plugin + github_ci by default).
name: PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  actions: read
  pull-requests: write
  id-token: write

jobs:
  review:
    uses: jedwards1230/release-workflows/.github/workflows/claude-pr-review.yml@v1
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      extra_plugins: |
        plugin-dev@claude-plugins-official
      extra_plugin_marketplaces: |
        https://github.com/anthropics/claude-plugins-official.git
      focus: |
        wiki-server is a Go HTTP service rendering an Obsidian vault to HTML.
        - Path traversal: request paths reaching filepath.Join / file reads (the
          /raw and .md handlers) need Clean + a containment check; reject ".."
          and absolute paths.
        - HTML/template injection (XSS): unescaped vault content, template.HTML
          casts, goldmark unsafe-HTML, or text/template where html/template is
          required.
        - HTTP input handling; Go correctness (ignored errors, nil deref,
          unchecked type assertions, missing defer Close).
        - Code↔chart drift: a new WIKI_* env var / flag / port must be exposed in
          the Helm chart under deploy/helm/my-wiki/.
        - For plugin files (manifest, hooks, skills, agents, commands), use plugin-dev's plugin-validator / skill-reviewer agents.
        Do NOT re-flag gofmt/go vet/golangci-lint — CI owns those.

  pr-review:
    name: PR Review
    if: always()
    needs: [review]
    runs-on: ubuntu-latest
    steps:
      - name: Check review result
        run: |
          result="${{ needs.review.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            echo "PR Review passed (result: $result)"; exit 0
          fi
          echo "PR Review failed (result: $result)"; exit 1
