# CI pipeline: test, lint, and build verification for wiki-server.
name: CI

run-name: "CI: ${{ github.event.pull_request.title || github.ref_name }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Run tests (with integration tag)
        run: go test -tags=integration -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Write coverage summary
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "## Test Coverage: ${coverage}%" >> $GITHUB_STEP_SUMMARY

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: latest

      - name: Check go mod tidy
        run: go mod tidy && git diff --exit-code go.mod

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Build binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o wiki-server ./cmd/wiki-server

      - name: Write build summary
        run: |
          echo "## Build" >> $GITHUB_STEP_SUMMARY
          echo "Binary size: $(du -h wiki-server | cut -f1)" >> $GITHUB_STEP_SUMMARY

  ci:
    name: CI
    if: always()
    needs: [test, lint, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=("${{ needs.test.result }}" "${{ needs.lint.result }}" "${{ needs.build.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "CI failed"
              exit 1
            fi
          done
          echo "All checks passed"
