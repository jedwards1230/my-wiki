# Auto-version and release on push to main.
# Detects bump type from PR labels (defaults to patch), then delegates the
# version/tag/AI-release-notes pipeline to the shared
# jedwards1230/release-workflows/.github/workflows/ai-release.yml workflow,
# builds the Docker image + publishes the Helm chart, and creates the GitHub
# Release with install snippets prepended to the AI-generated body.

name: Release

run-name: >-
  ${{
    github.event_name == 'workflow_dispatch'
      && format('Release: {0}{1}',
           inputs.dry_run && 'dry-run ' || '',
           inputs.bump_type)
      || format('Release: {0}', github.event.head_commit.message || github.sha)
  }}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      dry_run:
        description: "Dry run — compute version and preview notes without tagging or publishing"
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  detect:
    name: Detect bump type
    runs-on: ubuntu-latest
    outputs:
      bump_type: ${{ steps.bump.outputs.type }}
      dry_run: ${{ steps.bump.outputs.dry_run }}
    steps:
      - name: Determine bump type
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # workflow_dispatch: use provided inputs
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.bump_type }}" >> $GITHUB_OUTPUT
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "dry_run=true" >> $GITHUB_OUTPUT
              echo "::notice::Dry run: previewing release with bump_type=${{ inputs.bump_type }}"
            else
              echo "dry_run=false" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # push event: check PR labels for semver override, default to patch.
          # Retry up to 3 times — GitHub API may not have the merge commit indexed
          # immediately after the push event fires.
          LABELS=""
          for attempt in 1 2 3; do
            LABELS=$(gh pr list --state merged --base main --limit 100 \
              --json labels,mergeCommit \
              | jq -r --arg sha "$GITHUB_SHA" \
                '.[] | select(.mergeCommit.oid == $sha) | .labels[].name' 2>/dev/null || echo "")
            if [ -n "$LABELS" ]; then
              break
            fi
            echo "Attempt ${attempt}: no labels found for ${GITHUB_SHA}, retrying in 5s..."
            sleep 5
          done

          echo "Labels for commit ${GITHUB_SHA}: ${LABELS:-<none>}"

          if echo "$LABELS" | grep -q 'semver:major'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q 'semver:minor'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi
          echo "dry_run=false" >> $GITHUB_OUTPUT

  prepare:
    name: Tag & Generate Notes
    needs: [detect]
    uses: jedwards1230/release-workflows/.github/workflows/ai-release.yml@0c57d2b2c7cb044adaa1f3a070192677ab1f3bfd # v1
    with:
      service_name: my-wiki
      service_description: "an Obsidian-backed wiki with a native Go renderer, served from K8s"
      bump_type: ${{ needs.detect.outputs.bump_type }}
      chart_path: deploy/helm/my-wiki/Chart.yaml
      dry_run: ${{ needs.detect.outputs.dry_run == 'true' }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  build:
    name: Build and Push Image
    needs: [detect, prepare]
    if: needs.detect.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Publish Helm Chart
    needs: [detect, prepare]
    if: needs.detect.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push
        run: |
          helm package deploy/helm/my-wiki/
          helm push my-wiki-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Write summary
        run: |
          CHART_VERSION=$(grep '^version:' deploy/helm/my-wiki/Chart.yaml | awk '{print $2}')
          echo "## Helm Chart Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chart Version | ${CHART_VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`oci://ghcr.io/${{ github.repository_owner }}/charts/my-wiki\` |" >> $GITHUB_STEP_SUMMARY

  release:
    name: Create GitHub Release
    needs: [detect, prepare, build, helm]
    if: needs.detect.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Compose release body (install snippets + AI notes)
        env:
          BODY_B64: ${{ needs.prepare.outputs.release_body }}
          VERSION: ${{ needs.prepare.outputs.version }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          # ai-release.yml emits a base64-encoded body; decode before use.
          echo "$BODY_B64" | base64 -d > /tmp/ai_body.md

          # Prepend install snippets so consumers see "how do I get this?"
          # before scrolling through the AI summary + commit list.
          {
            echo "## Install"
            echo ""
            echo "### Docker"
            echo ""
            echo '```bash'
            echo "docker pull ${REGISTRY}/${IMAGE_NAME}:${VERSION}"
            echo '```'
            echo ""
            echo "### Helm"
            echo ""
            echo '```bash'
            echo "helm install wiki oci://ghcr.io/${REPO_OWNER}/charts/my-wiki --version ${VERSION}"
            echo '```'
            echo ""
            echo "---"
            echo ""
          } > /tmp/release_body.md
          cat /tmp/ai_body.md >> /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.version }}
          body_path: /tmp/release_body.md
          make_latest: true

      - name: Write workflow summary
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          BUMP_TYPE: ${{ needs.detect.outputs.bump_type }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          {
            echo "## Release ${TAG}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | ${VERSION} |"
            echo "| Image | \`${REGISTRY}/${IMAGE_NAME}:${VERSION}\` |"
            echo "| Chart | \`oci://ghcr.io/${REPO_OWNER}/charts/my-wiki:${VERSION}\` |"
            echo "| Bump | ${BUMP_TYPE} |"
          } >> $GITHUB_STEP_SUMMARY
